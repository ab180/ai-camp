<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>Q1 보충 — 비용 vs 성능</title>
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{font-family:'Pretendard',sans-serif;background:#222}
  .slide{width:720pt;height:405pt;background:#0F0F0F;color:#fff;padding:30pt 40pt;display:flex;flex-direction:column;gap:14pt}
  .head{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:1pt solid #333;padding-bottom:12pt}
  .head h2{font-size:22pt;font-weight:800;letter-spacing:-0.5pt}
  .head h2 .hl{color:#00D9FF}
  .head .eb{font-family:'JetBrains Mono',monospace;font-size:9pt;color:#00D9FF;letter-spacing:2pt}
  .body{display:grid;grid-template-columns:1.6fr 1fr;gap:18pt;flex:1}
  .chart{background:#1A1A1A;border:1pt solid #333;padding:22pt;display:flex;flex-direction:column}
  .chart-title{font-family:'JetBrains Mono',monospace;font-size:10pt;color:#B0B0B0;letter-spacing:1.5pt}
  .chart-title b{color:#fff}
  .chart svg{width:100%;flex:1;margin-top:8pt}
  .side{display:flex;flex-direction:column;gap:12pt}
  .perf{background:#1A1A1A;border:1pt solid #333;padding:18pt;flex:1;display:flex;flex-direction:column;justify-content:center}
  .perf .lbl{font-family:'JetBrains Mono',monospace;font-size:9pt;color:#B0B0B0;letter-spacing:1.5pt}
  .perf .big{font-size:32pt;font-weight:800;letter-spacing:-1pt;line-height:1.3;color:#00D9FF;margin-top:6pt}
  .perf p{font-size:10pt;color:#B0B0B0;line-height:1.5;margin-top:8pt}
  .rule{background:#252525;border:1pt solid #333;padding:18pt;flex:1;display:flex;flex-direction:column;justify-content:center}
  .rule .lbl{font-family:'JetBrains Mono',monospace;font-size:9pt;color:#00D9FF;letter-spacing:1.5pt}
  .rule p{font-size:13pt;font-weight:600;line-height:1.5;margin-top:10pt}
  .src{font-family:'JetBrains Mono',monospace;font-size:8pt;color:#666;letter-spacing:1pt;border-top:1pt solid #333;padding-top:8pt}
</style>
</head>
<body>
  <div class="slide">
    <header class="head">
      <h2>Q1+. 토큰 비용은 <span class="hl">기하급수</span>, 성능 향상은 <span class="hl">선형</span></h2>
      <p class="eb">04 / 09 · COST</p>
    </header>
    <div class="body">
      <div class="chart">
        <p class="chart-title">TOKEN USAGE (relative to <b>chat baseline</b>)</p>
        <svg viewBox="0 0 480 240" preserveAspectRatio="xMidYMid meet">
          <!-- baseline grid -->
          <line x1="50" y1="220" x2="470" y2="220" stroke="#333" stroke-width="0.5"/>
          <line x1="50" y1="160" x2="470" y2="160" stroke="#222" stroke-width="0.5" stroke-dasharray="2,3"/>
          <line x1="50" y1="100" x2="470" y2="100" stroke="#222" stroke-width="0.5" stroke-dasharray="2,3"/>
          <line x1="50" y1="40" x2="470" y2="40" stroke="#222" stroke-width="0.5" stroke-dasharray="2,3"/>

          <text x="40" y="223" text-anchor="end" fill="#666" font-size="8" font-family="JetBrains Mono">0</text>
          <text x="40" y="163" text-anchor="end" fill="#666" font-size="8" font-family="JetBrains Mono">5×</text>
          <text x="40" y="103" text-anchor="end" fill="#666" font-size="8" font-family="JetBrains Mono">10×</text>
          <text x="40" y="43" text-anchor="end" fill="#666" font-size="8" font-family="JetBrains Mono">15×</text>

          <!-- Bar 1: chat 1× -->
          <rect x="80" y="208" width="90" height="12" fill="#666" rx="1"/>
          <text x="125" y="244" text-anchor="middle" fill="#B0B0B0" font-size="10" font-family="Pretendard" font-weight="600">CHAT</text>
          <text x="170" y="208" text-anchor="start" dx="6" fill="#fff" font-size="14" font-family="JetBrains Mono" font-weight="700">1×</text>

          <!-- Bar 2: agent 4× -->
          <rect x="225" y="172" width="90" height="48" fill="#fff" rx="1"/>
          <text x="270" y="244" text-anchor="middle" fill="#B0B0B0" font-size="10" font-family="Pretendard" font-weight="600">SINGLE AGENT</text>
          <text x="315" y="172" text-anchor="start" dx="6" fill="#fff" font-size="14" font-family="JetBrains Mono" font-weight="700">4×</text>

          <!-- Bar 3: multi 15× -->
          <rect x="370" y="40" width="90" height="180" fill="#00D9FF" rx="1"/>
          <text x="415" y="244" text-anchor="middle" fill="#00D9FF" font-size="10" font-family="Pretendard" font-weight="700">MULTI-AGENT</text>
          <text x="460" y="40" text-anchor="start" dx="6" fill="#00D9FF" font-size="14" font-family="JetBrains Mono" font-weight="700" dx="-90" dy="-4">15×</text>
        </svg>
      </div>
      <aside class="side">
        <div class="perf">
          <p class="lbl">PERFORMANCE GAIN</p>
          <p class="big">+90.2%</p>
          <p>Opus 리드 + Sonnet 서브 vs 단일 Opus</p>
        </div>
        <div class="rule">
          <p class="lbl">RULE OF THUMB</p>
          <p>작업 가치 &gt; 토큰 비용일 때만 멀티 사용</p>
        </div>
      </aside>
    </div>
    <p class="src">SOURCE · ANTHROPIC ENGINEERING — DIRECT QUOTES (4× / 15× / 90.2%)</p>
  </div>
</body>
</html>
