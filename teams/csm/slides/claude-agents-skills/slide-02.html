<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>TL;DR</title>
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{font-family:'Pretendard',sans-serif;background:#222}
  .slide{width:720pt;height:405pt;background:#0F0F0F;color:#fff;padding:32pt 40pt;display:flex;flex-direction:column;gap:20pt}
  .head{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:1pt solid #333;padding-bottom:14pt}
  .head h2{font-size:26pt;font-weight:800;letter-spacing:-0.5pt}
  .head .eb{font-family:'JetBrains Mono',monospace;font-size:9pt;color:#00D9FF;letter-spacing:2pt}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14pt;flex:1}
  .card{background:#1A1A1A;border:1pt solid #333;padding:22pt;display:flex;flex-direction:column;justify-content:space-between;position:relative}
  .qn{font-family:'JetBrains Mono',monospace;font-size:10pt;letter-spacing:2pt;color:#00D9FF;font-weight:600}
  .qt{font-size:12pt;color:#B0B0B0;margin-top:6pt;line-height:1.4}
  .ans{font-size:24pt;font-weight:800;line-height:1.3;letter-spacing:-0.5pt;margin-top:22pt;color:#fff}
  .ans .hl{color:#00D9FF}
  .tag{font-family:'JetBrains Mono',monospace;font-size:10pt;color:#888;margin-top:auto;padding-top:14pt;border-top:1pt dashed #333}
  .footer{display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;font-size:9pt;color:#666;letter-spacing:1pt;border-top:1pt solid #333;padding-top:12pt}
</style>
</head>
<body>
  <div class="slide">
    <header class="head">
      <h2>3가지 질문, 한 줄 답</h2>
      <p class="eb">TL;DR · 02 / 09</p>
    </header>
    <div class="grid">
      <article class="card">
        <div>
          <p class="qn">Q1</p>
          <p class="qt">서브에이전트, 몇 개가 효율적인가</p>
          <p class="ans">복잡도 따라<br><span class="hl">1 → 2-4 → 10+</span></p>
        </div>
        <p class="tag">→ 보통 2–4개</p>
      </article>
      <article class="card">
        <div>
          <p class="qn">Q2</p>
          <p class="qt">서브가 또 서브를 부를 수 있는가</p>
          <p class="ans">공식적으로<br><span class="hl">불가능</span></p>
        </div>
        <p class="tag">→ 메인 세션에서 chain</p>
      </article>
      <article class="card">
        <div>
          <p class="qn">Q3</p>
          <p class="qt">효율적인 스킬 구조는</p>
          <p class="ans">SKILL.md +<br><span class="hl">3단 점진 로딩</span></p>
        </div>
        <p class="tag">→ Progressive Disclosure</p>
      </article>
    </div>
    <footer class="footer">
      <span>각 카드 = 다음 슬라이드 1장씩</span>
      <span>SOURCE · ANTHROPIC OFFICIAL</span>
    </footer>
  </div>
</body>
</html>
