<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>Cover</title>
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{font-family:'Pretendard',sans-serif;background:#222}
  .slide{width:720pt;height:405pt;background:#0F0F0F;color:#fff;padding:36pt 40pt;display:grid;grid-template-columns:1.4fr 1fr;gap:32pt;position:relative;overflow:hidden}
  .slide::before{content:'';position:absolute;left:40pt;right:40pt;top:24pt;height:1pt;background:#333}
  .slide::after{content:'';position:absolute;left:40pt;right:40pt;bottom:24pt;height:1pt;background:#333}
  .topbar{position:absolute;top:30pt;left:40pt;right:40pt;display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;font-size:9pt;color:#B0B0B0;letter-spacing:1pt}
  .left{display:flex;flex-direction:column;justify-content:center}
  .eyebrow{font-family:'JetBrains Mono',monospace;font-size:10pt;letter-spacing:3pt;color:#00D9FF;text-transform:uppercase;margin-bottom:18pt}
  .title{font-size:42pt;font-weight:800;line-height:1.2;letter-spacing:-1pt}
  .title .accent{color:#00D9FF}
  .sub{font-size:13pt;color:#B0B0B0;line-height:1.6;margin-top:18pt;max-width:320pt}
  .right{display:flex;flex-direction:column;justify-content:center;border-left:1pt solid #333;padding-left:32pt}
  .index-label{font-family:'JetBrains Mono',monospace;font-size:9pt;color:#666;letter-spacing:2pt;margin-bottom:14pt}
  .item{padding:11pt 0;border-bottom:1pt solid #1A1A1A;display:flex;align-items:baseline;gap:14pt}
  .item:last-child{border-bottom:0}
  .num{font-family:'JetBrains Mono',monospace;font-size:11pt;color:#00D9FF;font-weight:600;width:24pt;flex-shrink:0}
  .qtxt{font-size:13pt;color:#fff;line-height:1.4;font-weight:500}
  .bottombar{position:absolute;bottom:30pt;left:40pt;right:40pt;display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;font-size:9pt;color:#666;letter-spacing:1pt}
</style>
</head>
<body>
  <div class="slide">
    <div class="topbar">
      <span>CLAUDE CODE / OFFICIAL GUIDE</span>
      <span>2026-04-30</span>
    </div>
    <div class="left">
      <p class="eyebrow">3 Questions · Official Sources</p>
      <h1 class="title">서브에이전트 &amp;<br>스킬, 공식이<br>말한 <span class="accent">3가지 답</span></h1>
      <p class="sub">Anthropic Engineering 블로그 + Claude Code 공식 문서 직접 인용. 추측 0, 1차 출처 5개.</p>
    </div>
    <div class="right">
      <p class="index-label">INDEX</p>
      <div class="item">
        <span class="num">Q1</span>
        <span class="qtxt">서브에이전트, 몇 개가 효율적인가</span>
      </div>
      <div class="item">
        <span class="num">Q2</span>
        <span class="qtxt">서브가 또 서브를 부를 수 있는가</span>
      </div>
      <div class="item">
        <span class="num">Q3</span>
        <span class="qtxt">효율적인 스킬 구조는 무엇인가</span>
      </div>
    </div>
    <div class="bottombar">
      <span>9 SLIDES</span>
      <span>MODERN DARK</span>
    </div>
  </div>
</body>
</html>
