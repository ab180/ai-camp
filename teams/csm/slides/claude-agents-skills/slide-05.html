<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>Q2 — Nested</title>
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{font-family:'Pretendard',sans-serif;background:#222}
  .slide{width:720pt;height:405pt;background:#0F0F0F;color:#fff;padding:24pt 32pt;display:flex;flex-direction:column;gap:10pt;overflow:hidden}
  .head{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:1pt solid #333;padding-bottom:12pt}
  .head h2{font-size:22pt;font-weight:800;letter-spacing:-0.5pt}
  .head h2 .hl{color:#FF5555}
  .head .eb{font-family:'JetBrains Mono',monospace;font-size:9pt;color:#00D9FF;letter-spacing:2pt}
  .body{display:grid;grid-template-columns:1fr 1fr;gap:12pt;flex:1;min-height:0}
  .panel{background:#1A1A1A;border:1pt solid #333;padding:12pt 14pt;display:flex;flex-direction:column;min-height:0;overflow:hidden}
  .panel.ng{border-color:#552020}
  .panel.ok{border-color:#00536a}
  .panel-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14pt}
  .panel-head h3{font-family:'JetBrains Mono',monospace;font-size:10pt;letter-spacing:1.5pt;font-weight:700}
  .ng .panel-head h3{color:#FF5555}
  .ok .panel-head h3{color:#00D9FF}
  .panel-head .badge{font-family:'JetBrains Mono',monospace;font-size:14pt;font-weight:700}
  .ng .badge{color:#FF5555}
  .ok .badge{color:#00D9FF}
  .panel svg{width:100%;flex:1}
  .bottom{display:grid;grid-template-columns:1fr 1fr;gap:12pt;flex-shrink:0}
  .why{background:#252525;border:1pt solid #333;padding:10pt 14pt}
  .why .lbl{font-family:'JetBrains Mono',monospace;font-size:9pt;color:#B0B0B0;letter-spacing:1.5pt;font-weight:700}
  .why p{font-size:11pt;font-weight:600;margin-top:4pt;line-height:1.4}
  .why .small{font-size:9pt;font-weight:400;color:#B0B0B0;margin-top:3pt;line-height:1.45}
  .src{font-family:'JetBrains Mono',monospace;font-size:8pt;color:#666;letter-spacing:1pt;border-top:1pt solid #333;padding-top:8pt}
</style>
</head>
<body>
  <div class="slide">
    <header class="head">
      <h2>Q2. 서브에이전트가 또 서브를 부를 수 있는가 — <span class="hl">불가능</span></h2>
      <p class="eb">05 / 09 · NESTED</p>
    </header>
    <div class="body">
      <section class="panel ng">
        <div class="panel-head">
          <h3>DOES NOT WORK</h3>
          <span class="badge">✕</span>
        </div>
        <svg viewBox="0 0 280 200" preserveAspectRatio="xMidYMid meet">
          <rect x="100" y="10" width="80" height="32" rx="4" fill="#fff"/>
          <text x="140" y="31" text-anchor="middle" fill="#0F0F0F" font-size="11" font-family="JetBrains Mono" font-weight="700">Main</text>
          <line x1="140" y1="42" x2="140" y2="68" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>
          <rect x="100" y="74" width="80" height="32" rx="4" fill="#252525" stroke="#666" stroke-width="1"/>
          <text x="140" y="95" text-anchor="middle" fill="#fff" font-size="11" font-family="JetBrains Mono" font-weight="600">Sub</text>
          <line x1="140" y1="106" x2="140" y2="132" stroke="#FF5555" stroke-width="1.5" stroke-dasharray="4,3"/>
          <rect x="100" y="138" width="80" height="32" rx="4" fill="none" stroke="#FF5555" stroke-width="1.5" stroke-dasharray="4,3"/>
          <text x="140" y="159" text-anchor="middle" fill="#FF5555" font-size="11" font-family="JetBrains Mono" font-weight="600">Sub</text>
          <line x1="106" y1="138" x2="174" y2="170" stroke="#FF5555" stroke-width="2"/>
          <line x1="174" y1="138" x2="106" y2="170" stroke="#FF5555" stroke-width="2"/>
          <text x="140" y="190" text-anchor="middle" fill="#FF5555" font-size="9" font-family="JetBrains Mono">BLOCKED BY DESIGN</text>
          <defs>
            <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
              <polygon points="0 0, 8 4, 0 8" fill="#666"/>
            </marker>
          </defs>
        </svg>
      </section>
      <section class="panel ok">
        <div class="panel-head">
          <h3>DO THIS INSTEAD</h3>
          <span class="badge">✓</span>
        </div>
        <svg viewBox="0 0 280 200" preserveAspectRatio="xMidYMid meet">
          <rect x="100" y="10" width="80" height="32" rx="4" fill="#fff"/>
          <text x="140" y="31" text-anchor="middle" fill="#0F0F0F" font-size="11" font-family="JetBrains Mono" font-weight="700">Main</text>
          <line x1="140" y1="42" x2="40" y2="100" stroke="#00D9FF" stroke-width="1.5" marker-end="url(#arr2)"/>
          <line x1="140" y1="42" x2="140" y2="100" stroke="#00D9FF" stroke-width="1.5" marker-end="url(#arr2)"/>
          <line x1="140" y1="42" x2="240" y2="100" stroke="#00D9FF" stroke-width="1.5" marker-end="url(#arr2)"/>
          <rect x="10" y="106" width="60" height="32" rx="4" fill="#1A1A1A" stroke="#00D9FF" stroke-width="1"/>
          <text x="40" y="127" text-anchor="middle" fill="#00D9FF" font-size="10" font-family="JetBrains Mono" font-weight="700">Sub A</text>
          <rect x="110" y="106" width="60" height="32" rx="4" fill="#1A1A1A" stroke="#00D9FF" stroke-width="1"/>
          <text x="140" y="127" text-anchor="middle" fill="#00D9FF" font-size="10" font-family="JetBrains Mono" font-weight="700">Sub B</text>
          <rect x="210" y="106" width="60" height="32" rx="4" fill="#1A1A1A" stroke="#00D9FF" stroke-width="1"/>
          <text x="240" y="127" text-anchor="middle" fill="#00D9FF" font-size="10" font-family="JetBrains Mono" font-weight="700">Sub C</text>
          <text x="140" y="170" text-anchor="middle" fill="#B0B0B0" font-size="9" font-family="JetBrains Mono">PARALLEL · 1 LEVEL DEEP</text>
          <text x="140" y="190" text-anchor="middle" fill="#00D9FF" font-size="9" font-family="JetBrains Mono">MAIN ORCHESTRATES</text>
          <defs>
            <marker id="arr2" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
              <polygon points="0 0, 8 4, 0 8" fill="#00D9FF"/>
            </marker>
          </defs>
        </svg>
      </section>
    </div>
    <div class="bottom">
      <div class="why">
        <p class="lbl">WHY · 의도된 제약</p>
        <p>무한 중첩 / 재귀 루프 방지</p>
        <p class="small">실행 계층을 관리 가능한 깊이로 유지하기 위함</p>
      </div>
      <div class="why">
        <p class="lbl">WORKAROUND</p>
        <p>메인에서 chain 또는 Skills 활용</p>
        <p class="small">orchestrator-worker 패턴 권장</p>
      </div>
    </div>
    <p class="src">SOURCE · CLAUDE CODE DOCS — CREATE CUSTOM SUBAGENTS · GITHUB ISSUE #4182</p>
  </div>
</body>
</html>
