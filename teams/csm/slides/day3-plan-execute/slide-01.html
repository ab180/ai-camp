<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Day 3 · S01 Cover</title>
<link rel="stylesheet" href="./assets/warm-neutral.css">
<style>
  body { display: grid; grid-template-columns: 1.75fr 1fr; gap: 24pt; }
  .left { display: flex; flex-direction: column; justify-content: space-between; }
  .mark { display: flex; align-items: center; gap: 8pt; }
  .mark .dot { width: 10pt; height: 10pt; border-radius: 999pt; background: #c56a4a; }
  .mark .label { font-size: 10pt; letter-spacing: 0.3em; color: #b45a34; font-weight: 600; text-transform: uppercase; }
  .subline { font-size: 13pt; color: #7d6b5a; font-family: 'SF Mono', 'Menlo', monospace; letter-spacing: -0.005em; border-top: 1px dashed #d4c4ac; padding-top: 10pt; }
  .right { display: flex; flex-direction: column; justify-content: flex-end; gap: 12pt; }
  .right .card { padding: 22pt 22pt; }
  .right .card .lead { font-size: 10pt; letter-spacing: 0.2em; color: #f2cdb4; font-weight: 600; text-transform: uppercase; }
  .right .card .axes { font-size: 28pt; font-weight: 500; color: #fff; letter-spacing: -0.02em; line-height: 1.1; margin-top: 8pt; }
  .right .card .desc { font-size: 11pt; color: #f5e4d4; margin-top: 10pt; line-height: 1.55; }
  .roadmap { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8pt; margin-top: 14pt; padding-top: 12pt; border-top: 1px dashed #d4c4ac; }
  .roadmap .stage { padding: 8pt 10pt; border-radius: 8pt; background: #ebe1d2; display: flex; flex-direction: column; gap: 2pt; opacity: 0.55; }
  .roadmap .stage.active { background: #c56a4a; color: #f7efe4; opacity: 1; }
  .roadmap .stage .d { font-size: 8.5pt; letter-spacing: 0.2em; font-weight: 700; color: #b45a34; text-transform: uppercase; }
  .roadmap .stage.active .d { color: #f2cdb4; }
  .roadmap .stage .t { font-size: 10pt; font-weight: 600; color: #2b2520; line-height: 1.25; letter-spacing: -0.005em; }
  .roadmap .stage.active .t { color: #fff; }
  .roadmap .stage .ax { font-size: 8pt; color: #7d6b5a; margin-top: 2pt; }
  .roadmap .stage.active .ax { color: #f5e4d4; }
</style>
</head>
<body>
  <div class="left">
    <div class="mark"><span class="dot"></span><span class="label">Day 3</span></div>
    <div>
      <div class="title" style="font-size: 48pt;">본인 업무로<br>사이클을 돌린다</div>
      <div class="title-sub" style="font-size: 20pt; margin-top: 14pt;">반복 적용 + Subagent 본격</div>
    </div>
    <div class="subline">어제는 운영진 케이스로 1사이클을 봤다. 오늘은 본인 업무에 그 사이클을 직접 가져다 대고, Subagent 3패턴을 체험한다.</div>
    <div class="roadmap">
      <div class="stage"><span class="d">Day 1</span><span class="t">CLAUDE.md</span><span class="ax">축 1·2</span></div>
      <div class="stage"><span class="d">Day 2</span><span class="t">MCP + 1사이클</span><span class="ax">축 2·3</span></div>
      <div class="stage active"><span class="d">Day 3 · 오늘</span><span class="t">본인 적용 + Subagent</span><span class="ax">축 3·4</span></div>
      <div class="stage"><span class="d">Day 4</span><span class="t">검증·시스템</span><span class="ax">축 5·6</span></div>
    </div>
  </div>
  <div class="right">
    <div class="card terra">
      <div class="lead">오늘의 핵심</div>
      <div class="axes">사이클<br><span style="font-size: 20pt; opacity: 0.9;">2-3회 반복</span></div>
      <div class="desc">운영진 케이스 구경에서 내 업무 직접 실행으로. 반복할수록 70 → 90%로 올라가는 것을 체감한다.</div>
    </div>
  </div>
</body>
</html>
