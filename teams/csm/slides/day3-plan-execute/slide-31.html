<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Day 3 · S31 마무리 클로징</title>
<link rel="stylesheet" href="./assets/warm-neutral.css">
<style>
  body { display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
  .wrap { max-width: 620pt; display: flex; flex-direction: column; align-items: center; gap: 18pt; }
  .tag { font-size: 11pt; letter-spacing: 0.28em; color: #b45a34; font-weight: 600; text-transform: uppercase; }
  .h-main { font-size: 36pt; font-weight: 500; color: #2b2520; letter-spacing: -0.01em; line-height: 1.2; }
  .h-main em { font-style: normal; color: #b45a34; }
  .rule-c { width: 52pt; height: 3pt; border-radius: 3pt; background: #c56a4a; }
  .msg { font-size: 13pt; line-height: 1.7; color: #42332a; max-width: 580pt; }
  .msg strong { color: #b45a34; font-weight: 600; }
  .outcomes { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10pt; width: 100%; margin-top: 6pt; }
  .out { padding: 10pt 12pt; background: #ebe1d2; border-radius: 10pt; text-align: left; }
  .out .olabel { font-size: 8.5pt; letter-spacing: 0.18em; color: #b45a34; font-weight: 700; text-transform: uppercase; margin-bottom: 3pt; }
  .out .otext { font-size: 10.5pt; color: #2b2520; font-weight: 600; line-height: 1.35; }
  .sign { font-size: 11pt; color: #7d6b5a; letter-spacing: 0.04em; margin-top: 4pt; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="tag">Day 3 · Wrap</div>
    <div class="h-main">오늘 <em>115분</em> 수고하셨습니다</div>
    <div class="rule-c"></div>
    <div class="msg"><strong>본인 케이스 사이클 적용</strong>과 <strong>Subagent 체험</strong>을 마쳤습니다.<br>세 번째 PR과 회고 1줄을 들고 내일 Day 4에서 만나요.</div>
    <div class="outcomes">
      <div class="out">
        <div class="olabel">산출물 1</div>
        <div class="otext">본인 케이스 사이클 2-3건 결과</div>
      </div>
      <div class="out">
        <div class="olabel">산출물 2</div>
        <div class="otext">Subagent 역할 분리 체험</div>
      </div>
      <div class="out">
        <div class="olabel">산출물 3</div>
        <div class="otext">세 번째 PR + 회고 1줄</div>
      </div>
    </div>
    <div class="sign">AB180 AI Camp · Day 4 → 검증 + 팀 공유</div>
  </div>
</body>
</html>
