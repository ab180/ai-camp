<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Day 3 · S36 CSM Subagent 용도</title>
<link rel="stylesheet" href="./assets/warm-neutral.css">
<style>
  body { display: flex; flex-direction: column; }
  .intro { font-size: 10.5pt; line-height: 1.55; color: #42332a; margin-top: 2pt; max-width: 640pt; }
  .intro strong { color: #b45a34; }
  .rows { display: flex; flex-direction: column; gap: 9pt; margin-top: 10pt; flex: 1; }
  .row { display: grid; grid-template-columns: 170pt 1fr; gap: 16pt; padding: 14pt 18pt; background: #ebe1d2; border-radius: 12pt; align-items: center; }
  .row .label { font-size: 14pt; font-weight: 700; color: #b45a34; letter-spacing: -0.005em; line-height: 1.3; }
  .row .parallels { font-size: 10.5pt; line-height: 1.6; color: #42332a; }
  .row .parallels strong { color: #2b2520; font-weight: 600; }
  .row .parallels .plus { color: #c56a4a; font-weight: 700; padding: 0 4pt; }
  .foot { margin-top: 10pt; padding: 9pt 14pt; background: #c56a4a; color: #f7efe4; border-radius: 10pt; font-size: 10pt; line-height: 1.55; }
  .foot strong { color: #fff; font-weight: 700; }
</style>
</head>
<body>
  <div class="eyebrow">사용처</div>
  <div class="h-large">CSM에서 <em>Subagent가 빛나는 곳</em></div>
  <div class="rule"></div>
  <div class="intro">공통점은 "<strong>여러 곳에서 동시에 끌어와야</strong> 답이 완성되는 작업". 서로 결과를 안 참조하는 것이 조건.</div>
  <div class="rows">
    <div class="row">
      <div class="label">리캡 메일 생성</div>
      <div class="parallels"><strong>히스토리 요약</strong><span class="plus">+</span><strong>다음 액션 초안</strong><span class="plus">+</span><strong>톤 체크</strong> 병렬</div>
    </div>
    <div class="row">
      <div class="label">문의 답변</div>
      <div class="parallels"><strong>과거 답변 검색</strong><span class="plus">+</span><strong>관련 문서 조회</strong><span class="plus">+</span><strong>답변 초안</strong> 병렬</div>
    </div>
    <div class="row">
      <div class="label">체크업 미팅 준비</div>
      <div class="parallels"><strong>지표 요약</strong><span class="plus">+</span><strong>지난 아젠다</strong><span class="plus">+</span><strong>팀 Slack 논의</strong> 병렬</div>
    </div>
  </div>
  <div class="foot">내가 평소 "끝나길 기다리면서 딴 일 하던" 패턴 = <strong>Subagent 후보</strong>.</div>
</body>
</html>
