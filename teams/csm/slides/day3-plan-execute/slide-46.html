<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Day 3 · S45 오늘 돌아보기</title>
<link rel="stylesheet" href="./assets/warm-neutral.css">
<style>
  body { display: flex; flex-direction: column; }
  .intro { font-size: 10.5pt; line-height: 1.55; color: #42332a; margin-top: 2pt; max-width: 640pt; }
  .intro strong { color: #b45a34; }
  .rows { display: flex; flex-direction: column; gap: 10pt; margin-top: 12pt; flex: 1; justify-content: center; }
  .row { display: grid; grid-template-columns: 1fr 24pt 1fr; gap: 14pt; padding: 16pt 22pt; background: #ebe1d2; border-radius: 14pt; align-items: center; }
  .row .before { font-size: 12pt; color: #7d6b5a; font-style: italic; line-height: 1.4; }
  .row .arrow { font-size: 16pt; color: #c56a4a; font-weight: 700; text-align: center; }
  .row .after { font-size: 12pt; font-weight: 600; color: #2b2520; letter-spacing: -0.005em; line-height: 1.4; }
  .row .after strong { color: #b45a34; }
  .foot { margin-top: 10pt; padding: 10pt 14pt; background: #c56a4a; color: #f7efe4; border-radius: 10pt; font-size: 11pt; line-height: 1.55; text-align: center; }
  .foot strong { color: #fff; font-weight: 700; }
</style>
</head>
<body>
  <div class="eyebrow">오늘 돌아보기 · 3가지 감각</div>
  <div class="h-large">오늘 바뀐 <em>내 3가지</em></div>
  <div class="rule"></div>
  <div class="intro">오늘 120분이 끝나면 AI 쓰는 방식이 3군데에서 달라져 있다. 체감이 안 난다면 필수 3개 자가진단부터 다시.</div>
  <div class="rows">
    <div class="row">
      <div class="before">"바로 시켰다"</div>
      <div class="arrow">→</div>
      <div class="after"><strong>묻고 시킨다</strong> — Clarify · Deep Interview</div>
    </div>
    <div class="row">
      <div class="before">"매번 설명했다"</div>
      <div class="arrow">→</div>
      <div class="after"><strong>스킬이 대신한다</strong> — 운영진 베이스 커스터마이징</div>
    </div>
    <div class="row">
      <div class="before">"내가 점검했다"</div>
      <div class="arrow">→</div>
      <div class="after"><strong>다른 에이전트가 점검한다</strong> — Skill Creator 첫 체감</div>
    </div>
  </div>
  <div class="foot">세 가지가 <strong>복리로 쌓이면</strong> 내일의 나는 더 빠르다 — Ouroboros.</div>
</body>
</html>
