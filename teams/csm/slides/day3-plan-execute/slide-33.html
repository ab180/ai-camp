<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Day 3 · S33 마무리 클로징</title>
<link rel="stylesheet" href="./assets/warm-neutral.css">
<style>
  body { display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
  .wrap { max-width: 640pt; display: flex; flex-direction: column; align-items: center; gap: 16pt; }
  .tag { font-size: 11pt; letter-spacing: 0.28em; color: #b45a34; font-weight: 600; text-transform: uppercase; }
  .h-main { font-size: 36pt; font-weight: 500; color: #2b2520; letter-spacing: -0.01em; line-height: 1.2; }
  .h-main em { font-style: normal; color: #b45a34; }
  .rule-c { width: 52pt; height: 3pt; border-radius: 3pt; background: #c56a4a; }
  .msg { font-size: 13pt; line-height: 1.7; color: #42332a; max-width: 600pt; }
  .msg strong { color: #b45a34; font-weight: 600; }
  .outcomes { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8pt; width: 100%; margin-top: 4pt; }
  .out { padding: 9pt 10pt; background: #ebe1d2; border-radius: 9pt; text-align: left; }
  .out .olabel { font-size: 8pt; letter-spacing: 0.18em; color: #b45a34; font-weight: 700; text-transform: uppercase; margin-bottom: 3pt; }
  .out .otext { font-size: 9.8pt; color: #2b2520; font-weight: 600; line-height: 1.32; }
  .sign { font-size: 11pt; color: #7d6b5a; letter-spacing: 0.04em; margin-top: 2pt; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="tag">Day 3 · Wrap</div>
    <div class="h-main">오늘 <em>120분</em> 수고하셨습니다</div>
    <div class="rule-c"></div>
    <div class="msg"><strong>짝꿍 점검 메모 + 사이클 결과 + Subagent 1회 + 머지된 PR + 회고 1줄</strong> — 5종을 가지고 내일 만나요.</div>
    <div class="outcomes">
      <div class="out">
        <div class="olabel">산출물 1</div>
        <div class="otext">짝꿍 점검 메모</div>
      </div>
      <div class="out">
        <div class="olabel">산출물 2</div>
        <div class="otext">사이클 결과 2-3건</div>
      </div>
      <div class="out">
        <div class="olabel">산출물 3</div>
        <div class="otext">Subagent 1회 호출</div>
      </div>
      <div class="out">
        <div class="olabel">산출물 4</div>
        <div class="otext">머지된 PR + pull</div>
      </div>
      <div class="out">
        <div class="olabel">산출물 5</div>
        <div class="otext">회고 1줄</div>
      </div>
    </div>
    <div class="sign">AB180 AI Camp · Day 4 → 검증·개선·시스템</div>
  </div>
</body>
</html>
