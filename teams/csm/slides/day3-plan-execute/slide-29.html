<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Day 3 · S29 오늘 돌아보기 3가지</title>
<link rel="stylesheet" href="./assets/warm-neutral.css">
<style>
  body { display: flex; flex-direction: column; }
  .intro { font-size: 10.5pt; line-height: 1.55; color: #42332a; margin-top: 2pt; max-width: 640pt; }
  .intro strong { color: #b45a34; }
  .rows { display: flex; flex-direction: column; gap: 9pt; flex: 1; margin-top: 10pt; }
  .row { display: grid; grid-template-columns: 1fr auto; gap: 14pt; padding: 14pt 18pt; background: #ebe1d2; border-radius: 12pt; align-items: center; }
  .row .left { display: flex; flex-direction: column; gap: 4pt; }
  .row .left .before { font-size: 10pt; color: #7d6b5a; text-decoration: line-through; }
  .row .left .after { font-size: 12.5pt; font-weight: 600; color: #2b2520; line-height: 1.4; letter-spacing: -0.005em; }
  .row .left .after em { font-style: normal; color: #b45a34; }
  .row .tag { font-size: 9pt; letter-spacing: 0.18em; color: #b45a34; font-weight: 700; text-transform: uppercase; background: rgba(197,106,74,0.1); padding: 4pt 8pt; border-radius: 6pt; white-space: nowrap; }
  .foot { margin-top: 10pt; padding: 10pt 16pt; background: #c56a4a; color: #f7efe4; border-radius: 10pt; font-size: 10.5pt; line-height: 1.55; }
  .foot strong { color: #fff; font-weight: 700; }
</style>
</head>
<body>
  <div class="eyebrow">오늘 돌아보기</div>
  <div class="h-large">오늘 바뀐 <em>3가지 감각</em></div>
  <div class="rule"></div>
  <div class="intro">오늘이 끝날 때 이 3가지가 머릿속에 남아 있으면 Day 3의 목표를 달성한 것이다.</div>
  <div class="rows">
    <div class="row">
      <div class="left">
        <div class="before">"운영진 케이스를 구경했다"</div>
        <div class="after"><em>내 업무로 직접 돌렸다</em> — 암묵지가 보이기 시작했다</div>
      </div>
      <div class="tag">B0 · B1</div>
    </div>
    <div class="row">
      <div class="left">
        <div class="before">"사이클은 한 번으로 충분하다"</div>
        <div class="after"><em>반복할수록 70 → 90%</em>로 올라간다 — 한 번에 100%는 없다</div>
      </div>
      <div class="tag">B1 핵심</div>
    </div>
    <div class="row">
      <div class="left">
        <div class="before">"AI는 하나씩 순서대로 쓴다"</div>
        <div class="after">Subagent <em>3패턴</em>으로 병렬·역할 분리·컨텍스트 보호가 가능하다</div>
      </div>
      <div class="tag">B2</div>
    </div>
  </div>
  <div class="foot">세 가지가 복리로 쌓이면 내일의 나는 더 빠르다. <strong>오늘 만든 회고 1줄이 Day 4 검증의 시작점.</strong></div>
