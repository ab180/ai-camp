<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Day 3 · Slide Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .viewer-container { width: 100%; height: 100%; display: flex; flex-direction: column; }
    .nav-bar {
      height: 48px;
      background: #1a1a1a;
      border-bottom: 1px solid #333;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      flex-shrink: 0;
      position: relative;
      z-index: 100;
    }
    .nav-bar button {
      background: #333;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 6px 16px;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
    }
    .nav-bar button:hover { background: #444; }
    .nav-bar button:disabled { opacity: 0.35; cursor: default; }
    .slide-counter {
      color: #aaa;
      font-size: 14px;
      font-weight: 500;
      min-width: 70px;
      text-align: center;
      font-variant-numeric: tabular-nums;
    }
    .btn-fullscreen {
      position: absolute;
      right: 16px;
      background: transparent !important;
      font-size: 18px;
      padding: 6px 10px !important;
    }
    .slide-viewport {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    .slide-scaler {
      width: 720pt;
      height: 405pt;
      position: relative;
      transform-origin: center center;
    }
    .slide-frame {
      position: absolute;
      inset: 0;
      width: 720pt;
      height: 405pt;
      border: none;
      overflow: hidden;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
      background: #f5ede2;
    }
    .slide-frame.active {
      opacity: 1;
      pointer-events: auto;
    }
  </style>
</head>
<body>
  <div class="viewer-container">
    <div class="nav-bar">
      <button id="btn-prev" title="Previous (Left)">Prev</button>
      <span class="slide-counter" id="counter">1 / 47</span>
      <button id="btn-next" title="Next (Right)">Next</button>
      <button class="btn-fullscreen" id="btn-fs" title="Fullscreen (F)">&#x26F6;</button>
    </div>
    <div class="slide-viewport" id="viewport">
      <div class="slide-scaler" id="scaler"></div>
    </div>
  </div>
  <script>
    const TOTAL = 47;
    const scaler = document.getElementById('scaler');
    const counter = document.getElementById('counter');
    const btnPrev = document.getElementById('btn-prev');
    const btnNext = document.getElementById('btn-next');
    const btnFs = document.getElementById('btn-fs');
    const viewport = document.getElementById('viewport');

    let current = 1;
    const loaded = new Set();

    function pad(n) { return String(n).padStart(2, '0'); }

    function ensureFrame(n) {
      if (loaded.has(n)) return;
      const f = document.createElement('iframe');
      f.className = 'slide-frame';
      f.dataset.slide = n;
      f.src = 'slide-' + pad(n) + '.html';
      scaler.appendChild(f);
      loaded.add(n);
    }

    function activate(n) {
      ensureFrame(n);
      if (n > 1) ensureFrame(n - 1);
      if (n < TOTAL) ensureFrame(n + 1);
      scaler.querySelectorAll('.slide-frame').forEach(f => {
        f.classList.toggle('active', Number(f.dataset.slide) === n);
      });
      counter.textContent = n + ' / ' + TOTAL;
      btnPrev.disabled = n === 1;
      btnNext.disabled = n === TOTAL;
      const hash = '#' + n;
      if (location.hash !== hash) history.replaceState(null, '', hash);
    }

    function go(n) {
      n = Math.max(1, Math.min(TOTAL, n));
      current = n;
      activate(n);
    }

    function fit() {
      const pad = 24;
      const availW = viewport.clientWidth - pad;
      const availH = viewport.clientHeight - pad;
      const ptPx = 96 / 72;
      const w = 720 * ptPx;
      const h = 405 * ptPx;
      const scale = Math.min(availW / w, availH / h);
      scaler.style.transform = 'scale(' + scale + ')';
    }

    btnPrev.addEventListener('click', () => go(current - 1));
    btnNext.addEventListener('click', () => go(current + 1));
    btnFs.addEventListener('click', () => {
      if (!document.fullscreenElement) document.documentElement.requestFullscreen();
      else document.exitFullscreen();
    });
    window.addEventListener('resize', fit);
    window.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft' || e.key === 'PageUp') go(current - 1);
      else if (e.key === 'ArrowRight' || e.key === 'PageDown' || e.key === ' ') { e.preventDefault(); go(current + 1); }
      else if (e.key === 'Home') go(1);
      else if (e.key === 'End') go(TOTAL);
      else if (e.key.toLowerCase() === 'f') btnFs.click();
    });

    const hashN = parseInt((location.hash || '').slice(1), 10);
    go(Number.isFinite(hashN) && hashN > 0 ? hashN : 1);
    fit();
  </script>
</body>
</html>
