<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Day 4 · S24 본인 Compound 파이프라인 1단</title>
<link rel="stylesheet" href="./assets/warm-neutral.css">
<style>
  body { display: flex; flex-direction: column; padding: 22pt 30pt; }
  .intro { font-size: 10pt; line-height: 1.55; color: #42332a; margin-top: 1pt; max-width: 660pt; }
  .intro strong { color: #b45a34; }
  .code { margin-top: 11pt; padding: 13pt 16pt; background: #2b2520; color: #f7efe4; border-radius: 9pt; font-family: 'SF Mono', Menlo, monospace; font-size: 9.5pt; line-height: 1.6; white-space: pre; }

  .code .c { color: #a0917e; }
  .code .k { color: #ffdfc9; }

</style>
</head>
<body>
  <div class="eyebrow">B2 실습 · 1단</div>
  <div class="h-large">SKILL.md <code>## 회고</code> + <em>/wrap 호출</em></div>
  <div class="rule"></div>
  <div class="intro">파이프라인 1단은 단순. <strong>본인 SKILL.md에 <code>## 회고</code> 섹션</strong>을 추가하고, 작업 끝에 <code>/wrap</code>을 부르면 wrap이 알아서 신호를 누적한다.</div>
  <div class="code"><span class="c">## 본인 SKILL.md</span>

<span class="h">## 회고</span>
- <span class="k">2026-04-29</span>: 다음 액션 날짜 누락 (3회) <span class="c">→ rules/required.md</span>
- <span class="k">2026-05-06</span>: 톤 너무 정중 (2회) <span class="c">→ 다음 주 wrap 결과 보고 결정</span></div>
  <div class="flow">
    <div class="ftitle">SESSION FLOW</div>
    <div class="farr">
      <div class="node">작업 끝</div>
      <div class="arrow">&rarr;</div>
      <div class="node terra">/wrap 호출</div>
      <div class="arrow">&rarr;</div>
      <div class="node terra">자동 신호 누적</div>
      <div class="arrow">&rarr;</div>
      <div class="node">## 회고에 1줄</div>
    </div>
  </div>
</body>
